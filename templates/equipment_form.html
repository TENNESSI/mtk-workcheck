{% extends 'base.html' %}
{% block title %}{{ 'Редактировать технику' if item else 'Добавить технику' }}{% endblock %}
{% block content %}
<h1 class="h3 mb-3">{{ 'Редактировать технику' if item else 'Добавить технику' }}</h1>
<div class="card shadow-sm"><div class="card-body">
<form method="post" class="row g-3">
  <div class="col-md-4"><label class="form-label">Категория</label><input class="form-control" name="category" value="{{ item.category if item else '' }}" placeholder="Компьютер, монитор, мышь..." required></div>
  <div class="col-md-4"><label class="form-label">Бренд</label><input class="form-control" name="brand" value="{{ item.brand if item else '' }}"></div>
  <div class="col-md-4"><label class="form-label">Модель</label><input class="form-control" name="model" value="{{ item.model if item else '' }}"></div>
  <div class="col-md-4"><label class="form-label">Инвентарный номер</label><input class="form-control" name="asset_tag" value="{{ item.asset_tag if item else '' }}"></div>
  <div class="col-md-4"><label class="form-label">Серийный номер</label><input class="form-control" name="serial_number" value="{{ item.serial_number if item else '' }}"></div>
  <div class="col-md-4"><label class="form-label">Статус</label>
    <select class="form-select" name="status">
      {% for key, label in statuses.items() %}
      <option value="{{ key }}" {% if item and item.status == key %}selected{% elif not item and key == 'in_stock' %}selected{% endif %}>{{ label }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-md-4"><label class="form-label">Кому выдано</label><select class="form-select" name="assigned_user_id"><option value="">—</option>{% for user in users %}<option value="{{ user.id }}" {% if item and item.assigned_user_id == user.id %}selected{% endif %}>{{ user.full_name }}</option>{% endfor %}</select></div>
  <div class="col-md-4"><label class="form-label">Рабочее место</label><select class="form-select" name="workplace_id"><option value="">—</option>{% for workplace in workplaces %}<option value="{{ workplace.id }}" {% if item and item.workplace_id == workplace.id %}selected{% endif %}>{{ workplace.title }}</option>{% endfor %}</select></div>
  <div class="col-md-4"><label class="form-label">Дата покупки</label><input type="date" class="form-control" name="purchase_date" value="{{ item.purchase_date.isoformat() if item and item.purchase_date else '' }}"></div>
  <div class="col-md-4"><label class="form-label">Последний техосмотр</label><input type="date" class="form-control" name="last_maintenance_date" value="{{ item.last_maintenance_date.isoformat() if item and item.last_maintenance_date else '' }}"></div>
  <div class="col-12"><label class="form-label">Примечания</label><textarea class="form-control" name="notes" rows="3">{{ item.notes if item else '' }}</textarea></div>
  <div class="col-12"><button class="btn btn-primary">Сохранить</button> <a class="btn btn-outline-secondary" href="{{ url_for('inventory_list') }}">Назад</a></div>
</form>
</div></div>
{% endblock %}
